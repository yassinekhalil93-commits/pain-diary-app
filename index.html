<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Schmerztagebuch Pro+</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{font-family:-apple-system;margin:0;background:#f2f2f7;}
.screen{display:none;padding:15px;padding-bottom:80px;}
.active{display:block;}

.card{
background:white;
padding:15px;
border-radius:16px;
margin-bottom:15px;
}

button{
background:#007AFF;
color:white;
border:none;
padding:12px;
border-radius:10px;
width:100%;
margin-top:10px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
background:white;
}

.nav button{
flex:1;
background:none;
color:#007AFF;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
<h2>Login</h2>

<div class="card">
<input id="user" placeholder="Name">
<button onclick="login()">Start</button>
</div>
</div>

<!-- APP -->
<div id="app" class="screen">

<!-- ENTRY -->
<div id="entry">
<div class="card">

<input id="pain" type="number" placeholder="Schmerz 0-10">
<input id="stress" type="range" min="0" max="10">
<input id="med" placeholder="Medikament">

<select id="loc">
<option value="">Ort wählen</option>
<option>Kopf</option>
<option>Rücken</option>
<option>Bauch</option>
<option>Bein</option>
</select>

<textarea id="notes"></textarea>

<button onclick="save()">Speichern</button>

</div>
</div>

<!-- HISTORY -->
<div id="history" style="display:none">
<canvas id="chart"></canvas>
<div id="list"></div>
</div>

<!-- ANALYSIS -->
<div id="analysis" style="display:none">
<div id="ai"></div>
<button onclick="exportPDF()">PDF Export</button>
</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="showTab('entry')">➕</button>
<button onclick="showTab('history')">📊</button>
<button onclick="showTab('analysis')">🤖</button>
</div>

<script>

let user = localStorage.getItem("user")
let data = JSON.parse(localStorage.getItem("data")) || []

if(user){
document.getElementById("login").classList.remove("active")
document.getElementById("app").classList.add("active")
}

function login(){
user = document.getElementById("user").value
localStorage.setItem("user",user)
location.reload()
}

function showTab(tab){
document.getElementById("entry").style.display="none"
document.getElementById("history").style.display="none"
document.getElementById("analysis").style.display="none"

document.getElementById(tab).style.display="block"

if(tab==="history") render()
if(tab==="analysis") runAI()
}

function save(){

let pain = document.getElementById("pain").value

let entry={
date:new Date().toISOString(),
pain: pain===""?null:Number(pain),
stress:Number(document.getElementById("stress").value),
med:document.getElementById("med").value,
loc:document.getElementById("loc").value,
notes:document.getElementById("notes").value
}

if(entry.pain===null||entry.loc===""){
alert("Bitte alles ausfüllen")
return
}

data.push(entry)
localStorage.setItem("data",JSON.stringify(data))

alert("Gespeichert")

}

function render(){

let list=document.getElementById("list")
list.innerHTML=""

data.forEach(e=>{
list.innerHTML+=`
<div class="card">
${new Date(e.date).toLocaleDateString()}<br>
Schmerz:${e.pain}
</div>`
})

let labels=data.map(e=>e.date)
let values=data.map(e=>e.pain)

if(window.c) window.c.destroy()

window.c=new Chart(document.getElementById("chart"),{
type:"line",
data:{labels:labels,datasets:[{data:values}]}
})

}

function runAI(){

if(data.length<3){
document.getElementById("ai").innerText="Zu wenig Daten"
return
}

let avg=data.reduce((a,b)=>a+b.pain,0)/data.length

document.getElementById("ai").innerText=
"Durchschnitt Schmerz: "+avg.toFixed(1)

}

async function exportPDF(){

const { jsPDF } = window.jspdf
let doc = new jsPDF()

doc.text("Schmerztagebuch Bericht",10,10)

data.forEach((e,i)=>{
doc.text(`${e.date} Schmerz:${e.pain}`,10,20+(i*10))
})

doc.save("bericht.pdf")

}

</script>

</body>
</html>
